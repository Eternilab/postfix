## Do it only if the file doesn't exist
#
- name: "Check if exists : {{ postfix_dhparam_pem }}"
  ansible.builtin.stat:
    path: "{{ postfix_dhparam_pem }}"
  register: stat_result

# FIXME  could be mode : 0400 ?
- name: "Generate DH Parameters with a different size (4096 bits)"
  community.crypto.openssl_dhparam:
    path: "{{ postfix_dhparam_pem }}"
    owner: root
    group: "{{ root_group }}"
    mode: '0444'
    size: 4096
  when: not ansible_check_mode and not stat_result.stat.exists
  async: 0
  poll: 0
  become: true
  notify:
    - Restart postfix
  tags:
    - conf

- name: "Be sure postfix is running and enabled"
  ansible.builtin.service:
    name: postfix
    state: started
    enabled: true
  when: not ansible_check_mode
  become: true
  tags:
    - conf
