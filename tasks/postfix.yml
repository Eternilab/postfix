---
- name: "Be sure postfix is installed (APT based)"
  ansible.builtin.apt:
    pkg: 'postfix'
    state: present
  become: true
  when: ansible_pkg_mgr == 'apt'
  tags:
    - install

- name: "Be sure spool directory exists : {{ postfix_spool_dir }}"
  ansible.builtin.file:
    name: "{{ postfix_spool_dir }}"
    owner: root
    group: "{{ root_group }}"
    mode: '0755'
    recurse: false
    state: directory
  become: true
  notify:
    - Restart postfix
  tags:
    - conf

- name: "Set up /etc/mailname for Debian"
  ansible.builtin.template:
    src: mailname.j2
    dest: /etc/mailname
    owner: root
    group: "{{ root_group }}"
    mode: '0644'
  become: true
  when: ansible_distribution == 'Debian'
  notify:
    - Reload postfix
  tags:
    - conf

- name: "Be sure postfix is configured"
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "/etc/postfix/{{ item }}"
    owner: root
    group: root
    mode: '0644'
  with_items: "{{ postfix_filelist }}"
  become: true
  notify:
    - Reload postfix
  tags:
    - conf

